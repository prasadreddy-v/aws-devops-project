name: Deploy Flask App

on:
  push:
    branches:
      - main

env:
  ECR_REPOSITORY: flask-app
  CLUSTER_NAME: devops-eks
  AWS_REGION: ap-south-1

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} ./app

      - name: Tag Image
        run: |
          docker tag \
          $ECR_REPOSITORY:${{ github.sha }} \
          523835808362.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Image
        run: |
          docker push \
          523835808362.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      - name: Who am I
        run: |
          aws sts get-caller-identity    

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $CLUSTER_NAME

      - name: Debug EKS Access
        run: |
          kubectl config current-context
          kubectl get nodes    

      - name: Deploy with Helm
        run: |
          helm upgrade --install flask-app ./helm/flask-app \
            --set image.repository=523835808362.dkr.ecr.ap-south-1.amazonaws.com/flask-app \
            --set image.tag=${{ github.sha }}